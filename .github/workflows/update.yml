name: Atualizar dados & deploy

on:
  schedule:
    - cron: "0 15 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: busca dados CVM, calcula history.json e data.json base ────────────
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch CVM data, history.json, data.json base (sem optimizer k=10)
        run: python scripts/fetch_data.py --skip-k10

      - name: Upload artefatos para jobs paralelos
        uses: actions/upload-artifact@v4
        with:
          name: docs-base
          path: docs/
          retention-days: 1

  # ── Job 2: otimizador k=10 em paralelo (20 fatias) ───────────────────────────
  optimize-k10:
    needs: fetch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        slice: [0,1,2,3,4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download artefatos base
        uses: actions/download-artifact@v4
        with:
          name: docs-base
          path: docs/

      - name: Calcular fatia ${{ matrix.slice }}/5 do otimizador k=10
        run: python scripts/fetch_data.py --optimizer-slice ${{ matrix.slice }} 5

      - name: Upload resultado parcial
        uses: actions/upload-artifact@v4
        with:
          name: opt-slice-${{ matrix.slice }}
          path: docs/opt_slice_${{ matrix.slice }}.json
          retention-days: 1

  # ── Job 3: agrega resultados, commit, deploy ──────────────────────────────────
  aggregate:
    needs: optimize-k10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download artefatos base
        uses: actions/download-artifact@v4
        with:
          name: docs-base
          path: docs/

      - name: Download todas as fatias do otimizador
        uses: actions/download-artifact@v4
        with:
          pattern: opt-slice-*
          path: docs/
          merge-multiple: true

      - name: Agregar resultados e finalizar data.json
        run: python scripts/fetch_data.py --aggregate 5

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json
          git diff --cached --quiet || git commit -m "chore: update fund data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: false
