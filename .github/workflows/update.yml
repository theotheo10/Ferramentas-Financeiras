name: Atualizar dados & deploy

on:
  push:
    branches: [main]
  schedule:
    # ── Fundos (CVM) — duas vezes por dia ────────────────────────────────────
    - cron: "0 15 * * 1-5"   # 12:00 BRT
    - cron: "0 21 * * 1-5"   # 18:00 BRT
    # ── Breadth (Yahoo Finance) — a cada 15 min durante o pregão ─────────────
    # Pregão B3: 10:00–18:55 BRT = 13:00–21:55 UTC
    - cron: "0,15,30,45 13-21 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Fundos CVM (roda só nos horários 15:00 e 21:00 UTC, ou dispatch)
  # ════════════════════════════════════════════════════════════════════════════
  update-fundos:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       (contains(github.event.schedule, '0 15') ||
        contains(github.event.schedule, '0 21')))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (fundos)
        run: pip install requests pandas numpy yfinance pyarrow

      - name: Fetch CVM data e gera data.json + history.json
        run: python scripts/fetch_data.py

      - name: Commit dados de fundos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json
          git diff --cached --quiet || git commit -m "chore: update fund data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Breadth IBOV (roda em schedule e dispatch, não em push)
  # ════════════════════════════════════════════════════════════════════════════
  update-breadth:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (breadth)
        run: pip install pandas numpy yfinance pyarrow requests

      - name: Gera breadth.json e ibov_price.json
        run: python scripts/fetch_breadth.py

      - name: Commit dados de breadth
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/breadth.json docs/ibov_price.json data/prices.parquet data/breadth.parquet data/ibov_price.parquet
          git diff --cached --quiet || git commit -m "chore: update breadth $(date -u +%Y-%m-%dT%H:%M)Z"
          git pull --rebase origin main
          git push

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy GitHub Pages
  # Em push: roda direto (sem depender dos jobs de dados)
  # Em schedule/dispatch: roda após update-breadth
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [update-breadth]
    if: always() && (needs.update-breadth.result == 'success' || needs.update-breadth.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: false
